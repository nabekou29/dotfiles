set -g @plugin 'tmux-plugins/tpm'

set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-copycat'
set -g @plugin 'tmux-plugins/tmux-pain-control'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
# Vim-tmux seamless pane navigation (C-S-h/j/k/l)
is_vim="ps -o state= -o comm= -t '#{pane_tty}' | grep -iqE '^[^TXZ ]+ +(\\S+\\/)?g?(view|l?n?vim?x?|fzf)(diff)?$'"
bind -n 'C-S-h' if-shell "$is_vim" 'send-keys C-S-h' 'select-pane -L'
bind -n 'C-S-j' if-shell "$is_vim" 'send-keys C-S-j' 'select-pane -D'
bind -n 'C-S-k' if-shell "$is_vim" 'send-keys C-S-k' 'select-pane -U'
bind -n 'C-S-l' if-shell "$is_vim" 'send-keys C-S-l' 'select-pane -R'

set -g @resurrect-dir '~/.tmux/resurrect'

set -g mouse on
set -g status on
set -g status-keys vi

setw -g mode-keys vi
set -g xterm-keys on

set -g default-terminal "xterm-ghostty"
set -ga terminal-overrides ',xterm-ghostty:RGB'
set -ag terminal-features ",sync"

# Status bar (WezTerm-matching Iceberg theme)
set -g status-position top
set -g status-style "bg=#15161e"
set -g status-left-length 60
set -g status-right-length 180
set -g status-interval 5

# Left: [session] ► [git branch] ►
set -g status-left "#[fg=#15161e,bg=#5c76ae,bold]  #S #[fg=#5c76ae,bg=#2d4a5e]#[fg=#89b8c2,bg=#2d4a5e]  #(git -C #{pane_current_path} rev-parse --abbrev-ref HEAD 2>/dev/null) #[fg=#2d4a5e,bg=#15161e] "

# Tab styling (powerline)
set -g window-status-separator ""
set -g window-status-format "#[fg=#15161e,bg=#292e42]#[fg=#545c7e,bg=#292e42] #I  #W #[fg=#292e42,bg=#15161e]"
set -g window-status-current-format "#[fg=#15161e,bg=#7aa2f7]#[fg=#15161e,bg=#7aa2f7,bold] #I  #W #[fg=#7aa2f7,bg=#15161e]"

# Right: ◄[cwd] ◄[battery] ◄[music] ◄[time]
set -g status-right "#[fg=#263156,bg=#15161e]#[fg=#89b8c2,bg=#263156]  #(~/.config/tmux/scripts/cwd.sh #{pane_current_path}) #[fg=#374478,bg=#263156]#[fg=#b4be82,bg=#374478] #(~/.config/tmux/scripts/battery.sh) #[fg=#3f4e8b,bg=#374478]#[fg=#e27878,bg=#3f4e8b] #(~/.config/tmux/scripts/music.sh) #[fg=#4962af,bg=#3f4e8b]#[fg=#c6c8d1,bg=#4962af] %H:%M "

# Pane border
set -g pane-border-style "fg=#292e42"
set -g pane-active-border-style "fg=#7aa2f7"


# Message style
set -g message-style "fg=#c6c8d1,bg=#292e42"
set -g message-command-style "fg=#c6c8d1,bg=#292e42"

bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi C-v send -X rectangle-toggle

bind -n 'C-S-Enter' resize-pane -Z

bind -n M-N new-window -c "#{pane_current_path}"
bind -n M-L next-window
bind -n M-H previous-window
bind -n M-J switch-client -n
bind -n M-K switch-client -p
bind -n M-W kill-pane
bind -n 'M-{' swap-window -t -1\; select-window -t -1
bind -n 'M-}' swap-window -t +1\; select-window -t +1

bind -n M-v split-window -h -c "#{pane_current_path}"
bind -n M-s split-window -v -c "#{pane_current_path}"

bind -n M-g display-popup -E -w 80% -h 80% -d "#{pane_current_path}"

run '~/.config/tmux/plugins/tpm/tpm'
