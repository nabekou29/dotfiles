# yaml-language-server: $schema=https://raw.githubusercontent.com/nabekou29/trev/prototype/config.schema.json

sort:
    order: smart # name | size | mtime | type | extension
    direction: asc # asc | desc
    directories_first: true

display:
    show_hidden: false
    show_ignored: false
    show_preview: true
    show_root_entry: false
    modal_avoid_preview: false
    columns: # Display order of metadata columns
        - git_status
        - size
        - modified_at
    column_options:
        modified_at:
            format: relative # relative | absolute
            mode: os_mtime # os_mtime | recursive_max
    file_styles:
        - pattern: "README*"
          style:
              bold: true
        - pattern: ["*_test.*", "*_spec.*", "*.test.*", "*.spec.*"]
          style:
              fg: "#909090"
        - pattern: ["package-lock.json", "yarn.lock", "pnpm-lock.yaml"]
          style:
              fg: "#909090"
              italic: true

preview:
    max_lines: 1000
    max_bytes: 10485760 # 10 MB
    cache_size: 50
    command_timeout: 3 # seconds
    split_ratio: 40 # Tree/preview split % (wide layout)
    narrow_split_ratio: 60 # Tree/preview split % (narrow layout)
    narrow_width: 80 # Width threshold for narrow layout (columns)
    # commands:
    #     - name: ls
    #       command: lsd
    #       args: ["-la", "--color=always"]
    #       directories: true
    #       priority: low
    #     - command: dust
    #       args: ["-r"]
    #       directories: true
    #       priority: low
    #     - command: tree
    #       args: ["-L", "10"]
    #       directories: true
    #       priority: low
    #     - command: bat
    #       extensions: [md, ts, tsx]
    #       args: ["--color=always", "--style=plain", "--language=markdown"]
    #       priority: low

file_op:
    delete_mode: custom_trash
    undo_stack_size: 100

session:
    restore_by_default: true
    expiry_days: 90

watcher:
    enabled: true
    debounce_ms: 250

git:
    enabled: true

custom_actions:
    lazygit:
        description: "Open lazygit"
        run: "lazygit"
        run_mode: interactive

keybindings:
    disable_default: false
    universal:
        disable_default: false
        bindings:
            - key: "<M-d>"
              action: tree.sort.toggle_directories_first
            - key: "<C-g>"
              action: custom.lazygit

    daemon:
        file:
            bindings:
                - key: "<S-CR>"
                  notify: open_file_pick
