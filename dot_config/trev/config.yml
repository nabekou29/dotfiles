# yaml-language-server: $schema=https://raw.githubusercontent.com/nabekou29/trev/prototype/config.schema.json

sort:
    order: smart # name | size | mtime | type | extension
    direction: asc # asc | desc
    directories_first: true

display:
    show_hidden: false
    show_ignored: false
    show_preview: true
    show_root_entry: true
    columns: # Display order of metadata columns
        - git_status
        - size
        - modified_at
    column_options:
        modified_at:
            format: relative # relative | absolute
            mode: recursive_max # os_mtime | recursive_max

preview:
    max_lines: 1000
    max_bytes: 10485760 # 10 MB
    cache_size: 50
    command_timeout: 3 # seconds
    split: 50 # Tree/preview split % (wide layout)
    narrow_split: 60 # Tree/preview split % (narrow layout)
    narrow_threshold: 80 # Width threshold for narrow layout (columns)
    commands:
        - name: ls
          command: lsd
          args: ["-la", "--color=always"]
          directories: true
          priority: low
        - command: dust
          args: ["-r"]
          directories: true
          priority: low
        - command: tree
          args: ["-L", "10"]
          directories: true
          priority: low
        - command: bat
          extensions: [md, ts, tsx]
          args: ["--color=always", "--style=plain", "--language=markdown"]
          priority: low

file_operations:
    delete_mode: custom_trash
    undo_stack_size: 100

session:
    restore_by_default: true
    expiry_days: 90

watcher:
    enabled: true
    debounce_ms: 250

git:
    enabled: true

menus:
    copy:
        title: Copy to clipboard
        items:
            - key: r
              label: Relative path
              action: file_op.copy.relative_path
            - key: p
              label: Absolute path
              action: file_op.copy.absolute_path
            - key: n
              label: File name
              action: file_op.copy.file_name
            - key: s
              label: Stem
              action: file_op.copy.stem
            - key: d
              label: Parent directory
              action: file_op.copy.parent_dir
    tools:
        title: Tools
        items:
            - key: g
              label: Git status
              run: "git -C {root} status"
            - key: l
              label: Git log
              run: "git -C {root} log --oneline -20"
            - key: b
              label: Git blame
              run: "git -C {root} blame {path}"
            - key: o
              label: Open in Finder
              run: "open {dir}"
              background: true

keybindings:
    disable_default: false
    universal:
        disable_default: false
        bindings:
            - key: c
              menu: copy
            - key: m
              menu: tools

    daemon:
        file:
            bindings:
                - key: "<S-CR>"
                  notify: open_file_pick

