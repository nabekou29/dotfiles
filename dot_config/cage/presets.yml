presets:
    base:
        allow:
            - "." # current
            - "$XDG_CACHE_HOME" # ~/.cache
            - "$XDG_DATA_HOME" # ~/.local/share
            - "/private/tmp" # macos tmp directory
            - "/private/var"
            - "/var/folders" # macos mktemp
            - "/tmp"
            - "/dev"
            - "/Library/Caches" # macos app caches
            - "$HOME/Library/Caches" # macos app caches
            - "$HOME/.cache"

    git-enabled:
        allow-git: true

    claude-code:
        allow:
            - "$CLAUDE_CONFIG_DIR"
            - "$HOME/.npm"
            - "$HOME/.pnpm"
            - "/Library/pnpm"
            - "$HOME/.local"
        allow-keychain: true

auto-presets:
    - command: claude
      presets:
          - base
          - git-enabled
          - claude-code
