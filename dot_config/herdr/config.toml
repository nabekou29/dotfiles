# herdr configuration
# default config: herdr --default-config
# docs:           https://github.com/ogulcancelik/herdr/blob/master/CONFIGURATION.md

onboarding = false

[theme]
name = "tokyo-night"

[ui.sound]
enabled = true

[ui.toast]
delivery = "terminal"

[keys]
rename_tab = "prefix+shift+c"
settings = "prefix+p"
split_vertical = "prefix+v"
split_horizontal = "prefix+s"
previous_tab = "alt+shift+h"
next_tab = "alt+shift+l"
previous_workspace = "alt+shift+k"
next_workspace = "alt+shift+j"
previous_agent = ["alt+[", "alt+shift+["]
next_agent = ["alt+]", "alt+shift+]"]
zoom = "ctrl+shift+enter"

[[keys.command]]
key = "prefix+n"
type = "pane"
command = "nvim"

[[keys.command]]
key = "prefix+ctrl+g"
type = "popup"
command = "lazygit"
width = "80%"
height = "80%"

# vim-tmux-navigator 風の seamless ペイン移動。
# nvim の場合は ctrl+shift+<hjkl> を当該 pane に戻して nvim 側に処理させ、
# それ以外は herdr のペイン focus を動かす。
[[keys.command]]
key = "ctrl+shift+h"
type = "shell"
command = "$HOME/.config/herdr/nav.sh left h"

[[keys.command]]
key = "ctrl+shift+j"
type = "shell"
command = "$HOME/.config/herdr/nav.sh down j"

[[keys.command]]
key = "ctrl+shift+k"
type = "shell"
command = "$HOME/.config/herdr/nav.sh up k"

[[keys.command]]
key = "ctrl+shift+l"
type = "shell"
command = "$HOME/.config/herdr/nav.sh right l"

[[keys.command]]
key = "prefix+f"
type = "plugin_action"
command = "hotchpotch.herdr-tiny-fingers.open"
description = "fingers mode"

[ui]
show_agent_labels_on_pane_borders = true

agent_panel_sort = "spaces"
[experimental]
pane_history = true
switch_ascii_input_source_in_prefix = true
