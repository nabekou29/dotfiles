# herdr configuration
# default config: herdr --default-config
# docs:           https://github.com/ogulcancelik/herdr/blob/master/CONFIGURATION.md

onboarding = false

[theme]
name = "tokyo-night"

[ui.sound]
enabled = true

[ui.toast]
enabled = true

[keys]
previous_tab = "alt+["
next_tab = "alt+]"
