# herdr configuration
# default config: herdr --default-config
# docs:           https://github.com/ogulcancelik/herdr/blob/master/CONFIGURATION.md

onboarding = false

[theme]
name = "tokyo-night"

[ui.sound]
enabled = true

[ui.toast]
delivery = "terminal"

[keys]
rename_tab = "prefix+shift+c"
previous_tab = "alt+shift+h"
next_tab = "alt+shift+l"
previous_workspace = "alt+shift+k"
next_workspace = "alt+shift+j"
previous_agent = ["alt+[", "alt+shift+["]
next_agent = ["alt+]", "alt+shift+]"]
zoom = ["ctrl+shift+enter", "prefix+f"]

[[keys.command]]
key = "prefix+n"
type = "pane"
command = "nvim"

[[keys.command]]
key = "prefix+ctrl+g"
type = "pane"
command = "lazygit"

# vim-tmux-navigator 風の seamless ペイン移動。
# nvim の場合は ctrl+shift+<hjkl> を当該 pane に戻して nvim 側に処理させ、
# それ以外は herdr のペイン focus を動かす。
[[keys.command]]
key = "ctrl+shift+h"
type = "shell"
command = "$HOME/.config/herdr/nav.sh left h"

[[keys.command]]
key = "ctrl+shift+j"
type = "shell"
command = "$HOME/.config/herdr/nav.sh down j"

[[keys.command]]
key = "ctrl+shift+k"
type = "shell"
command = "$HOME/.config/herdr/nav.sh up k"

[[keys.command]]
key = "ctrl+shift+l"
type = "shell"
command = "$HOME/.config/herdr/nav.sh right l"
